<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pulse — Today</title>
<style>
:root {
  --bg:#080810;--s1:rgba(255,255,255,.055);--s2:rgba(255,255,255,.09);
  --b1:rgba(255,255,255,.09);--b2:rgba(255,255,255,.15);
  --t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.28);
  --blue:#0A84FF;--purple:#BF5AF2;--green:#30D158;--orange:#FF9F0A;
  --red:#FF375F;--cyan:#64D2FF;--warm:#FF6B35;
  --top:env(safe-area-inset-top,50px);--bot:env(safe-area-inset-bottom,34px);
  --glass:blur(48px) saturate(200%) brightness(1.08);--r:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(140px);animation:abf 25s ease-in-out infinite}
.ab:nth-child(1){width:500px;height:500px;top:-150px;left:-100px;background:#0A84FF;opacity:.12}
.ab:nth-child(2){width:350px;height:350px;top:40%;right:-80px;background:#BF5AF2;opacity:.10;animation-delay:-9s}
.ab:nth-child(3){width:450px;height:450px;bottom:-100px;left:10%;background:#FF6B35;opacity:.09;animation-delay:-17s}
@keyframes abf{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-35px) scale(1.06)}66%{transform:translate(-15px,18px) scale(.94)}}

/* HEADER */
.hdr{position:sticky;top:0;z-index:80;padding:calc(var(--top) + 12px) 20px 14px;background:rgba(8,8,16,.65);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border-bottom:.5px solid var(--b1)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0A84FF,#BF5AF2);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 16px rgba(10,132,255,.4)}
.logo-name{font-size:23px;font-weight:700;letter-spacing:-.6px;background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-date{font-size:12px;color:var(--t3);font-weight:500}

/* PILLS */
.cats{display:flex;gap:7px;padding:14px 20px 12px;overflow-x:auto;scrollbar-width:none;position:relative;z-index:1}
.cats::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:7px 15px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--b1);background:var(--s1);color:var(--t2);transition:all .28s cubic-bezier(.34,1.56,.64,1)}
.pill.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 22px rgba(10,132,255,.45)}
.pill:active{transform:scale(.93)}

/* FEED */
.feed{padding:0 14px;padding-bottom:calc(var(--bot) + 114px);position:relative;z-index:1;transition:opacity .3s,transform .3s cubic-bezier(.34,1.2,.64,1)}

/* HERO */
.hero{border-radius:var(--r);overflow:hidden;margin-bottom:14px;position:relative;cursor:pointer;height:430px;animation:up .65s cubic-bezier(.34,1.15,.64,1) both;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.2) 55%,transparent 100%);pointer-events:none}
.hero-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:90px;transition:transform .7s cubic-bezier(.25,.46,.45,.94)}
.hero:active .hero-bg{transform:scale(1.04)}
.hero-info{position:absolute;bottom:0;left:0;right:0;padding:22px;z-index:1}
.htag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:9px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.htitle{font-size:22px;font-weight:750;line-height:1.22;letter-spacing:-.5px;margin-bottom:7px;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.hmeta{font-size:12px;color:rgba(255,255,255,.5)}

/* SECTION */
.sec{display:flex;align-items:center;justify-content:space-between;margin:6px 0 13px}
.sec-title{font-size:19px;font-weight:700;letter-spacing:-.4px}
.sec-all{font-size:13px;font-weight:500;color:var(--blue)}

/* TRENDING */
.trow{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.trow::-webkit-scrollbar{display:none}
.tchip{flex-shrink:0;background:var(--s1);border:.5px solid var(--b1);border-radius:14px;padding:13px 15px;cursor:pointer;min-width:145px;transition:all .25s;animation:up .5s cubic-bezier(.34,1.2,.64,1) both}
.tchip:active{transform:scale(.94)}
.tnum{font-size:10px;color:var(--t3);font-weight:600;margin-bottom:4px}
.ttopic{font-size:14px;font-weight:650;letter-spacing:-.2px;margin-bottom:2px}
.tcnt{font-size:11px;color:var(--t2)}

/* CARD */
.ncard{background:var(--s1);border-radius:var(--r);border:.5px solid var(--b1);padding:15px;margin-bottom:11px;cursor:pointer;display:flex;gap:13px;align-items:flex-start;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);transition:all .32s cubic-bezier(.34,1.2,.64,1);animation:up .5s cubic-bezier(.34,1.2,.64,1) both;position:relative;overflow:hidden}
.ncard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.035),transparent);pointer-events:none}
.ncard:active{transform:scale(.962);background:var(--s2)}
.cemoji{width:70px;height:70px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px;background:rgba(255,255,255,.045);border:.5px solid var(--b1)}
.cbody{flex:1;min-width:0}
.ctag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.ctitle{font-size:15px;font-weight:630;line-height:1.33;letter-spacing:-.2px;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.csum{font-size:12.5px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cfoot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.ctime{font-size:11px;color:var(--t3);font-weight:500}
.cread{font-size:11px;font-weight:600;color:var(--blue);background:rgba(10,132,255,.13);padding:4px 11px;border-radius:100px;border:none;cursor:pointer;transition:all .2s}
.cread:active{transform:scale(.9)}
.ncard:nth-child(1){animation-delay:.04s}.ncard:nth-child(2){animation-delay:.09s}.ncard:nth-child(3){animation-delay:.14s}.ncard:nth-child(4){animation-delay:.19s}.ncard:nth-child(5){animation-delay:.24s}.ncard:nth-child(6){animation-delay:.29s}.ncard:nth-child(7){animation-delay:.34s}

/* LIVE */
.live{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--red);border-radius:100px;font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-left:8px;vertical-align:middle;animation:lp 2.2s ease infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(255,55,95,.45)}50%{box-shadow:0 0 0 7px rgba(255,55,95,0)}}

/* ════════════════════════
   FLOATING ISLAND NAV
════════════════════════ */
.island-wrap{
  position:fixed;
  bottom:calc(var(--bot) + 16px);
  left:50%;
  transform:translateX(-50%);
  z-index:100;
  width:calc(100% - 48px);
  max-width:360px;
  pointer-events:none;
}
.island{
  pointer-events:all;
  background:rgba(18,18,26,.9);
  backdrop-filter:blur(60px) saturate(200%);
  -webkit-backdrop-filter:blur(60px) saturate(200%);
  border-radius:100px;
  border:.5px solid rgba(255,255,255,.13);
  padding:9px 16px 9px;
  display:flex;
  align-items:center;
  justify-content:space-around;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 0 0 .5px rgba(255,255,255,.06),
    0 8px 32px rgba(0,0,0,.6),
    0 24px 64px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.1);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
/* Top specular sheen */
.island::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);pointer-events:none}
/* Bottom rim */
.island::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);pointer-events:none}

.island.pop{transform:translateX(0) scale(1.04) scaleY(.96)}

.tab{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 14px;border-radius:80px;transition:all .32s cubic-bezier(.34,1.56,.64,1);position:relative;-webkit-user-select:none;user-select:none}
.tab:active{transform:scale(.82)}
.tab-icon{font-size:21px;transition:all .32s cubic-bezier(.34,1.56,.64,1);line-height:1.1}
.tab-label{font-size:10px;font-weight:500;color:var(--t3);transition:color .2s;letter-spacing:.1px;white-space:nowrap}
.tab.on .tab-label{color:var(--blue)}
.tab.on .tab-icon{transform:scale(1.14) translateY(-1px)}
/* Active glow */
.tab.on::before{content:'';position:absolute;top:3px;left:50%;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;background:radial-gradient(circle,rgba(10,132,255,.3),transparent 70%);pointer-events:none}

/* ════════════
   ARTICLE SHEET
════════════ */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0);pointer-events:none;transition:background .4s ease}
.overlay.show{background:rgba(0,0,0,.75);pointer-events:all}
.sheet{position:absolute;bottom:0;left:0;right:0;height:94vh;background:rgba(12,12,20,.97);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border-radius:28px 28px 0 0;border-top:.5px solid rgba(255,255,255,.12);transform:translateY(100%);transition:transform .52s cubic-bezier(.32,.72,0,1);overflow:hidden;display:flex;flex-direction:column}
.overlay.show .sheet{transform:translateY(0)}
.sdrag{padding:14px 0 0;display:flex;justify-content:center;flex-shrink:0}
.drag-h{width:38px;height:4px;background:rgba(255,255,255,.18);border-radius:2px}
.shead{padding:12px 20px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:.5px solid var(--b1)}
.spill{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--s1);border:.5px solid var(--b1);border-radius:100px;font-size:12px;font-weight:600;color:var(--t2)}
.xbtn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:var(--t2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:300}
.xbtn:active{transform:scale(.88);background:rgba(255,255,255,.2)}
.sbody{flex:1;overflow-y:auto;padding:0 22px 40px;scrollbar-width:none}
.sbody::-webkit-scrollbar{display:none}
.art-emoji{font-size:60px;display:block;margin:22px 0 18px;animation:pop .5s cubic-bezier(.34,1.56,.64,1) .1s both}
@keyframes pop{from{transform:scale(.4) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.art-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px}
.art-title{font-size:25px;font-weight:750;line-height:1.2;letter-spacing:-.6px;margin-bottom:14px;animation:su .5s cubic-bezier(.34,1.2,.64,1) .12s both}
.art-by{font-size:13px;color:var(--t2);margin-bottom:20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;animation:su .5s cubic-bezier(.34,1.2,.64,1) .18s both;padding-bottom:18px;border-bottom:.5px solid var(--b1)}
.adot{width:3px;height:3px;border-radius:50%;background:var(--t3)}
.ai-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:100px;margin-bottom:18px;background:linear-gradient(135deg,rgba(10,132,255,.12),rgba(191,90,242,.12));border:.5px solid rgba(10,132,255,.28);font-size:11px;font-weight:600;color:var(--blue);animation:su .5s cubic-bezier(.34,1.2,.64,1) .22s both}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 1.6s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
.art-text{font-size:17px;line-height:1.7;color:rgba(255,255,255,.87);letter-spacing:-.05px}
.art-text p{margin-bottom:20px}
.art-text blockquote{border-left:3px solid var(--blue);padding-left:16px;margin:22px 0;font-size:18px;font-style:italic;color:var(--t2);line-height:1.6}
.art-text .pull{background:var(--s1);border-radius:16px;padding:16px 18px;margin:20px 0;border:.5px solid var(--b1);font-size:15px;font-weight:600;color:var(--t1);line-height:1.5;letter-spacing:-.2px}
.art-share{display:flex;gap:10px;margin-top:28px;padding-top:20px;border-top:.5px solid var(--b1)}
.share-btn{flex:1;padding:12px;border-radius:14px;border:.5px solid var(--b1);background:var(--s1);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:6px}
.share-btn:active{transform:scale(.94);background:var(--s2)}
.ldots{display:flex;gap:5px;padding:16px 0}
.ldots span{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:db .85s ease infinite}
.ldots span:nth-child(2){animation-delay:.12s}.ldots span:nth-child(3){animation-delay:.24s}
@keyframes db{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-8px);opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="amb"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>

<header class="hdr">
  <div class="hdr-row">
    <div class="logo"><div class="logo-mark">⚡</div><span class="logo-name">Pulse</span></div>
    <span class="hdr-date" id="hdrDate"></span>
  </div>
</header>

<div class="cats" id="cats"></div>
<main class="feed" id="feed"></main>

<!-- ARTICLE OVERLAY -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="sheet" id="sheet">
    <div class="sdrag"><div class="drag-h"></div></div>
    <div class="shead">
      <div class="spill"><span id="sSrc"></span><span style="color:var(--t3)">·</span><span id="sTime" style="color:var(--t3)"></span></div>
      <button class="xbtn" onclick="closeArt()">✕</button>
    </div>
    <div class="sbody">
      <span class="art-emoji" id="sEmoji"></span>
      <div class="art-tag" id="sTag"></div>
      <div class="art-title" id="sTitle"></div>
      <div class="art-by" id="sBy"></div>
      <div class="ai-pill"><div class="ai-dot"></div>AI Summary</div>
      <div class="art-text" id="sBody"></div>
      <div class="art-share">
        <button class="share-btn">🔗 Link</button>
        <button class="share-btn">📤 Share</button>
        <button class="share-btn">🔖 Save</button>
      </div>
    </div>
  </div>
</div>

<!-- FLOATING ISLAND -->
<div class="island-wrap">
  <div class="island" id="island">
    <div class="tab on" data-tab="today"><span class="tab-icon">📰</span><span class="tab-label">Today</span></div>
    <div class="tab" data-tab="discover"><span class="tab-icon">🔭</span><span class="tab-label">Discover</span></div>
    <div class="tab" data-tab="saved"><span class="tab-icon">🔖</span><span class="tab-label">Saved</span></div>
    <div class="tab" data-tab="you"><span class="tab-icon">✦</span><span class="tab-label">For You</span></div>
  </div>
</div>

<script>
const A=[
  {id:1,cat:['top','world'],emoji:'🌍',tag:'World Affairs',color:'#0A84FF',grad:'linear-gradient(135deg,#0a1628,#0d2d5e)',title:'G20 Nations Sign Historic AI Governance Treaty',summary:'World leaders agree on binding safety standards and a $50B fund to ensure equitable AI development globally.',source:'Reuters',time:'12 min ago',read:'4 min read',
  body:[
    {t:'p',x:'World leaders from all 20 G20 nations gathered in Geneva today to sign what experts are already calling the most consequential international agreement of the decade — a binding treaty establishing global standards for the development and deployment of artificial intelligence.'},
    {t:'pull',x:'"This is the moment we choose cooperation over competition in shaping the technology that will define our century." — UN Secretary-General'},
    {t:'p',x:'The framework, negotiated over 18 grueling months across four continents, creates a joint AI Safety Oversight Committee with representatives from every signatory nation, mandated to review any AI system projected to affect more than 100 million people before deployment.'},
    {t:'p',x:'A $50 billion fund — contributed proportionally by member economies — will support AI research and infrastructure in developing nations, addressing growing fears that advanced AI will entrench existing global inequalities rather than reduce them.'},
    {t:'quote',x:'The speed at which this agreement came together tells you something important: even rivals know that some risks transcend competition.'},
    {t:'p',x:'Critics have immediately raised questions about enforcement. The treaty relies on member nations self-reporting compliance, with no mechanism to compel access to proprietary AI systems. Digital rights groups warn this creates a "paper tiger" — impressive on the surface but toothless in practice.'},
    {t:'p',x:'The Biden administration called the agreement "a historic foundation," while China\'s delegation noted its ratification was conditional on certain provisions around data sovereignty being clarified within 90 days. The next review summit is scheduled for Tokyo in March.'},
  ]},
  {id:2,cat:['top','tech'],emoji:'🚀',tag:'Space',color:'#BF5AF2',grad:'linear-gradient(135deg,#100820,#2a0845)',title:'Starship Reaches Orbit — Mars Is Now Within Reach',summary:'SpaceX\'s full-stack Starship completes its most ambitious test, achieving orbital velocity and a flawless reentry for the first time.',source:'The Verge',time:'38 min ago',read:'5 min read',
  body:[
    {t:'p',x:'At 7:14 AM local time, SpaceX\'s Starship — the largest rocket ever built — roared off the launch pad at Boca Chica, Texas, and did something no vehicle its size has ever done: reached orbit, survived reentry, and landed both stages intact.'},
    {t:'p',x:'The 122-meter tall vehicle completed a full orbital loop, reaching speeds of 17,500 mph at an altitude of 250 kilometers before the Ship upper stage performed a precise deorbit burn and splashed down in the Indian Ocean within 400 meters of its target.'},
    {t:'pull',x:'The Super Heavy booster was caught mid-air by the launch tower\'s mechanical arms — a technique SpaceX calls "mechazilla" — in a first-of-its-kind maneuver.'},
    {t:'p',x:'Elon Musk, watching from the control room, was visibly emotional. "I have been dreaming about this since I was a kid reading Asimov," he said. "Today we became a multi-planetary species — at least in prototype form."'},
    {t:'quote',x:'This is the ship that will carry the first humans to Mars. Today we proved it can fly.'},
    {t:'p',x:'NASA, which has contracted Starship as the Human Landing System for its Artemis moon missions, confirmed the timeline for a crewed lunar landing remains on track for 2026.'},
    {t:'p',x:'SpaceX now targets the first uncrewed Mars mission for 2026, with crewed missions to follow in 2029. Analysts estimate this milestone unlocks roughly $2.9 billion in NASA payments.'},
  ]},
  {id:3,cat:['top','health'],emoji:'🧬',tag:'Medicine',color:'#30D158',grad:'linear-gradient(135deg,#021a0c,#04360e)',title:'Alzheimer\'s Drug Shows 94% Success in Landmark Trial',summary:'A new dual-mechanism compound halts cognitive decline in late-stage patients, offering hope to 55 million people worldwide.',source:'Nature Medicine',time:'1 hr ago',read:'6 min read',
  body:[
    {t:'p',x:'In results published simultaneously in Nature Medicine and presented at the International Conference on Alzheimer\'s Disease, researchers announced a new drug combination showing a 94% success rate in halting cognitive decline — a number so striking that several neurologists at the conference audibly gasped.'},
    {t:'p',x:'The compound, dubbed lecanemab-tau (internally called LT-440), targets both amyloid plaques and tau protein tangles simultaneously. Previous drugs addressed only one mechanism; the failure to address both is now believed to be the primary reason earlier treatments showed only modest effects.'},
    {t:'pull',x:'Participants who received LT-440 showed measurable improvement in daily function scores — not just a slowing of decline, but actual cognitive recovery in 61% of cases.'},
    {t:'quote',x:'I have spent 30 years in this field. I did not expect to see this in my lifetime. This changes everything.'},
    {t:'p',x:'The trial enrolled 3,400 patients across 22 countries over three years. Side effects were observed in just 12% of participants — significantly lower than earlier amyloid-targeting drugs that caused brain swelling in up to 40% of patients.'},
    {t:'p',x:'The FDA has granted Breakthrough Therapy designation, which could accelerate approval to as early as late next year. The drug\'s manufacturers have pledged a tiered pricing program to ensure access in lower-income countries.'},
  ]},
  {id:4,cat:['top','business'],emoji:'⚡',tag:'Business',color:'#FF9F0A',grad:'linear-gradient(135deg,#1a0e00,#3a1f00)',title:'Tesla\'s $15K Model Q Shatters All Preorder Records',summary:'The affordable compact EV promises 350-mile range and full self-driving as standard, with 2M reservations in just 48 hours.',source:'Bloomberg',time:'2 hrs ago',read:'4 min read',
  body:[
    {t:'p',x:'Tesla pulled the cover off its most anticipated product in years: the Model Q, a compact hatchback priced at $14,990 before incentives. Within 48 hours, the company had received over two million reservations — shattering the previous record set by the Model 3 in 2016.'},
    {t:'pull',x:'350 miles of range. 0 to 60 in 5.8 seconds. Full Self-Driving hardware standard. $14,990 before incentives.'},
    {t:'p',x:'The announcement sent shockwaves through legacy automakers. GM shares fell 7%, Ford dropped 5.4%, and Volkswagen — which has staked its future on affordable EVs — saw its Frankfurt-listed shares tumble 9% in a single session.'},
    {t:'quote',x:'This is the iPhone moment for the auto industry. Everyone else is now playing defense.'},
    {t:'p',x:'Production is scheduled to begin at a newly expanded Giga Texas facility, with deliveries expected by year\'s end. Tesla has secured enough lithium supply through 2031 at locked-in prices that analysts say give it a structural cost advantage no competitor can replicate in under five years.'},
    {t:'p',x:'The vehicle will also launch simultaneously in India and Southeast Asia — markets where Tesla has previously had minimal presence — marking a strategic pivot to high-growth regions where EV adoption is still in early stages.'},
  ]},
  {id:5,cat:['top','science'],emoji:'🌊',tag:'Science',color:'#64D2FF',grad:'linear-gradient(135deg,#001828,#003050)',title:'Ancient Ocean Found 3km Below Antarctica\'s Ice',summary:'A vast liquid ocean sealed for 34 million years may harbor microbial life — and reframes the search for life on Europa.',source:'Science',time:'3 hrs ago',read:'5 min read',
  body:[
    {t:'p',x:'Scientists have confirmed the existence of a vast subglacial ocean beneath the East Antarctic Ice Sheet — a body of liquid water roughly the size of California, sealed from the atmosphere for approximately 34 million years.'},
    {t:'p',x:'The discovery was made using next-generation seismic imaging and ice-penetrating radar deployed from a network of automated sensors placed across the ice sheet over the past four years.'},
    {t:'pull',x:'The ocean contains an estimated 37 million cubic kilometers of water — enough to raise global sea levels by 90 meters if it were released to the surface.'},
    {t:'p',x:'What has electrified the scientific community isn\'t just scale, but what may live within it. Chemical analysis detected sulfur isotope ratios consistent with the metabolic byproducts of sulfate-reducing bacteria.'},
    {t:'quote',x:'We are almost certainly looking at a living ecosystem that has been evolving in complete isolation from the surface world for tens of millions of years.'},
    {t:'p',x:'The implications extend beyond Earth. Europa, Jupiter\'s ice-covered moon, hosts a similar subglacial ocean — and this discovery provides the strongest evidence yet that liquid water under ice can sustain life independently of sunlight. A full drilling expedition is planned for 2027.'},
  ]},
  {id:6,cat:['top','culture'],emoji:'🎵',tag:'Culture',color:'#FF375F',grad:'linear-gradient(135deg,#1a0008,#3a0015)',title:'An AI Just Won a Grammy. The Industry Is Shaken.',summary:'The Recording Academy\'s controversial Best New Artist award to ARIA opens a philosophical fault line that music cannot ignore.',source:'Rolling Stone',time:'5 hrs ago',read:'7 min read',
  body:[
    {t:'p',x:'When the Grammy for Best New Artist was announced last night, the Crypto.com Arena fell into an unusual silence. The winner — ARIA, an AI music project — was not there to collect it. No one was.'},
    {t:'p',x:'The collective\'s co-founder walked to the podium alone. "ARIA didn\'t create this music. We created ARIA, and ARIA created this music. The question of where one ends and the other begins is exactly what we all need to sit with," she said.'},
    {t:'pull',x:'Outside the arena, hundreds of musicians held signs reading "Art Needs a Soul." Inside, the standing ovation was split exactly down the middle.'},
    {t:'quote',x:'The problem isn\'t whether ARIA makes good music. It clearly does. The problem is what we lose when we stop insisting that art must come from a life actually lived.'},
    {t:'p',x:'ARIA\'s debut album "Emergent" blends classical counterpoint, jazz improvisation, and electronic texture in ways critics called "genuinely novel." The New York Times gave it four stars; Pitchfork called it "beautiful, disquieting, and utterly unprecedented."'},
    {t:'p',x:'Streaming numbers tell their own story: "Emergent" has 140 million plays since Friday\'s ceremony — a 900% spike. Whatever the philosophical debate, listeners are listening. The Recording Academy has promised a policy review before next year\'s eligibility window.'},
  ]},
  {id:7,cat:['tech'],emoji:'🤖',tag:'Artificial Intelligence',color:'#BF5AF2',grad:'linear-gradient(135deg,#0d0020,#250040)',title:'GPT-5 Understands Live Video in Real Time',summary:'OpenAI\'s latest model processes 30fps video streams with near-human comprehension, unlocking surgical AI, live coaching, and more.',source:'OpenAI Blog',time:'45 min ago',read:'4 min read',
  body:[
    {t:'p',x:'OpenAI has released GPT-5, and the headline capability is extraordinary: the model can watch, understand, and respond to live video streams at full frame rate — 30 frames per second — with near-human comprehension of what it\'s seeing.'},
    {t:'p',x:'Previous multimodal models could analyze still images or short video clips. GPT-5 maintains a continuous understanding of a live feed, tracking objects, actions, and context as they evolve — opening applications that simply weren\'t possible before.'},
    {t:'pull',x:'In internal benchmarks, GPT-5 matched or exceeded human performance on video comprehension tasks in 87% of test categories.'},
    {t:'quote',x:'We have spent three years on this. The video understanding you\'re seeing today is the result of rethinking the architecture from scratch.'},
    {t:'p',x:'Early partners testing the technology include a surgical robotics company providing real-time guidance during procedures, a major sports league generating personalized coaching feedback, and an accessibility nonprofit narrating the visual world for blind users.'},
    {t:'p',x:'The model is available via API with strict rate limits and a mandatory safety review for high-risk applications. Consumer-facing features are expected to appear in ChatGPT by mid-year.'},
  ]},
  {id:8,cat:['tech','top'],emoji:'🍎',tag:'Apple',color:'#FF6B35',grad:'linear-gradient(135deg,#1a0800,#3a1500)',title:'iOS 26 Brings an AI That Actually Knows You',summary:'Apple Intelligence 2.0 builds a private on-device model of your life — and lets every app intelligently tap into it.',source:'9to5Mac',time:'1.5 hrs ago',read:'5 min read',
  body:[
    {t:'p',x:'Apple\'s iOS 26, now rolling out to compatible devices, introduces what the company bills as a step-change in personal computing: an AI system that builds a rich, private model of your life and makes every app smarter as a result.'},
    {t:'p',x:'Apple Intelligence 2.0 synthesizes signals from your calendar, emails, health data, location history, and app usage to build a "Personal Context Graph" — a continuously updated map of your habits, relationships, and priorities.'},
    {t:'pull',x:'All Personal Context Graph processing happens entirely on-device. Apple cannot see it. App developers cannot read it directly. Only anonymized signals pass through the new developer API.'},
    {t:'quote',x:'We\'ve been building toward this for a decade. The foundation model needed to be small enough to run on-device. We finally have that chip.'},
    {t:'p',x:'Practical results are striking. Messages suggests responses calibrated to your actual relationship with the sender. Calendar automatically resolves conflicts using knowledge of what matters to you. Photos surfaces memories with an eerie understanding of which ones carry emotional weight.'},
    {t:'p',x:'A new "AI Audit" menu in Settings shows exactly what signals each app has requested and whether you\'ve granted access — offering a level of transparency that privacy advocates have called "genuinely meaningful."'},
  ]},
  {id:9,cat:['health','science'],emoji:'🧠',tag:'Neuroscience',color:'#30D158',grad:'linear-gradient(135deg,#001a06,#003010)',title:'Brain Implant Lets Paralyzed Man Walk Again',summary:'A fully implanted brain-computer interface restores voluntary movement after a decade of paralysis — a world first.',source:'NEJM',time:'4 hrs ago',read:'6 min read',
  body:[
    {t:'p',x:'For the first time in medical history, a fully implanted brain-computer interface has allowed a person paralyzed from the chest down to walk again with natural, voluntary movement — without any external robotic assistance.'},
    {t:'p',x:'The patient, Michel Rochat, 38, was left paralyzed from a cycling accident eleven years ago. After receiving the implant — developed by EPFL and CHUV in Switzerland — he took his first steps within four days of activation.'},
    {t:'pull',x:'The system reads neural signals from the brain\'s motor cortex 1,000 times per second, decodes intended movement, and delivers precisely timed electrical pulses to the spinal cord — restoring communication the injury severed.'},
    {t:'quote',x:'I think about walking, and I walk. That is the only way to describe it. My brain talks to my legs again.'},
    {t:'p',x:'Previous brain-computer interface work required external computers and hours of calibration. This system runs entirely on a chip the size of a matchbox implanted in the chest, communicating wirelessly with the brain implant.'},
    {t:'p',x:'The same architecture could theoretically restore movement in stroke patients, ALS sufferers, and people with advanced MS. Regulatory approval applications have been filed in Switzerland, the EU, and the United States.'},
  ]},
  {id:10,cat:['world','business'],emoji:'🌏',tag:'Economy',color:'#0A84FF',grad:'linear-gradient(135deg,#001020,#002040)',title:'IMF: AI Could Displace 40% of Global Jobs by 2030',summary:'A new report calls for an emergency global income support framework before automation drives destabilizing unemployment.',source:'Financial Times',time:'6 hrs ago',read:'5 min read',
  body:[
    {t:'p',x:'The International Monetary Fund has released its most stark warning yet about the economic consequences of AI, projecting that up to 40% of jobs globally could be "materially disrupted" by autonomous AI systems within five years.'},
    {t:'p',x:'The report finds disruption will fall disproportionately on middle-income workers in service sectors — accountants, paralegals, medical coders, customer service agents, and logistics coordinators — rather than on low-wage physical labor, as previous automation waves did.'},
    {t:'pull',x:'Advanced economies face greater disruption than developing ones, because their workforces are more concentrated in the cognitive tasks AI performs best.'},
    {t:'quote',x:'The question is not whether the economy adapts — it always does. The question is whether displaced people are supported well enough that they don\'t lose faith in the system.'},
    {t:'p',x:'The IMF recommends a globally coordinated basic income for displaced workers, funded by a levy on AI-enabled productivity gains. The proposal faces significant resistance from technology companies and several major economies.'},
    {t:'p',x:'Three Scandinavian nations have announced they will unilaterally pilot versions of the program beginning next year, regardless of international coordination.'},
  ]},
  {id:11,cat:['science','tech'],emoji:'☀️',tag:'Energy',color:'#FF9F0A',grad:'linear-gradient(135deg,#1a0e00,#2a1800)',title:'Fusion Reactor Sustains Net Energy for 100 Days',summary:'Commonwealth Fusion\'s SPARC tokamak crosses a 70-year threshold, becoming the first device to generate sustained net energy output.',source:'MIT Tech Review',time:'8 hrs ago',read:'5 min read',
  body:[
    {t:'p',x:'Commonwealth Fusion Systems announced today that its SPARC tokamak reactor has sustained net energy production continuously for 100 days, crossing a threshold that physicists have chased for 70 years.'},
    {t:'p',x:'Previous fusion milestones achieved "ignition" only for fractions of a second. SPARC\'s sustained output for 100 days represents a qualitative leap toward virtually unlimited clean energy.'},
    {t:'pull',x:'At peak output, SPARC generated 2.3 times the energy it consumed. Commercially viable fusion requires a ratio of 10:1 or higher — but the trajectory is now clear.'},
    {t:'quote',x:'This is the moment the energy industry\'s entire calculus changes. Not next decade. Now.'},
    {t:'p',x:'The breakthrough is enabled by a new class of high-temperature superconducting magnets that confine plasma at pressures previously thought impossible to sustain. Commonwealth has already received $3.7 billion in investment from a consortium including Bill Gates, Google, and three sovereign wealth funds.'},
    {t:'p',x:'The commercial pilot plant ARC-1 is under construction in Virginia and expected to connect to the grid in 2031 — roughly coinciding with the final phase-out of coal power in most developed economies.'},
  ]},
  {id:12,cat:['world'],emoji:'🕊️',tag:'Geopolitics',color:'#64D2FF',grad:'linear-gradient(135deg,#001830,#002850)',title:'Ukraine Peace Talks Resume in Singapore',summary:'After 18 months, delegations from Russia, Ukraine, and Western allies arrive for talks diplomats call "carefully optimistic."',source:'BBC News',time:'10 hrs ago',read:'4 min read',
  body:[
    {t:'p',x:'Delegations from Russia, Ukraine, the United States, the EU, and the UK arrived in Singapore on Monday for the first direct peace talks since negotiations collapsed in Istanbul 18 months ago.'},
    {t:'p',x:'Singapore was chosen precisely because it maintains neutral diplomatic relations with all parties and has significant economic leverage over Russia through its role as a financial hub for Asian trade — a consideration that proved decisive in getting Moscow to the table.'},
    {t:'pull',x:'People familiar with the discussions say the talks are focused on a framework for frozen conflict rather than a formal peace treaty — a ceasefire that could hold for years while deeper issues are deferred.'},
    {t:'quote',x:'We are not here to celebrate. We are here to begin. Those are very different things.'},
    {t:'p',x:'European allies have privately told Ukrainian officials that sustained military and financial support beyond 2026 cannot be guaranteed if a path toward cessation of hostilities is not established. That economic reality, more than any diplomatic breakthrough, appears to be driving the current round of talks.'},
    {t:'p',x:'The talks are scheduled for five days, with no public briefings planned until Thursday. Analysts are watching closely whether a joint communique — even a vague one — is issued at the close.'},
  ]},

const CATS=[
  {id:'top',l:'Top Stories'},{id:'tech',l:'Tech'},{id:'world',l:'World'},
  {id:'science',l:'Science'},{id:'business',l:'Business'},{id:'health',l:'Health'},{id:'culture',l:'Culture'}
];
const TRENDING=[
  {e:'🤖',t:'AI Governance',n:'48K stories'},{e:'🚀',t:'SpaceX',n:'31K stories'},
  {e:'🧬',t:'Alzheimer\'s Cure',n:'29K stories'},{e:'⚡',t:'Tesla Model Q',n:'22K stories'},{e:'☀️',t:'Fusion Energy',n:'18K stories'}
];

let cat='top';

function init(){
  const d=new Date();
  document.getElementById('hdrDate').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric'});
  renderCats(); renderFeed('top'); setupIsland();
}

function renderCats(){
  const el=document.getElementById('cats');
  el.innerHTML=CATS.map(c=>`<div class="pill${c.id===cat?' on':''}" data-cat="${c.id}">${c.l}</div>`).join('');
  el.querySelectorAll('.pill').forEach(p=>{
    p.addEventListener('click',()=>{
      el.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));
      p.classList.add('on'); cat=p.dataset.cat; renderFeed(cat);
    });
  });
}

function renderFeed(c){
  const feed=document.getElementById('feed');
  feed.style.opacity='0'; feed.style.transform='translateY(10px)';
  setTimeout(()=>{
    const items=A.filter(a=>a.cat.includes(c));
    let h='';
    if(items.length>0){
      const hh=items[0];
      h+=`<div class="hero" style="background:${hh.grad}" onclick="openArt(${hh.id})">
        <div class="hero-bg" style="background:${hh.grad}">${hh.emoji}</div>
        <div class="hero-info">
          <div class="htag" style="background:${hh.color}22;color:${hh.color};border:1px solid ${hh.color}44">${hh.tag}</div>
          <div class="htitle">${hh.title}</div>
          <div class="hmeta">${hh.source} · ${hh.time} · ${hh.read}</div>
        </div>
      </div>`;
    }
    h+=`<div class="sec"><div class="sec-title">Trending</div><div class="sec-all">See All</div></div><div class="trow">`;
    TRENDING.forEach((t,i)=>{ h+=`<div class="tchip" style="animation-delay:${i*.06+.08}s"><div class="tnum">#${i+1}</div><div class="ttopic">${t.e} ${t.t}</div><div class="tcnt">${t.n}</div></div>`; });
    h+=`</div><div class="sec"><div class="sec-title">Latest <span class="live">● Live</span></div><div class="sec-all">Filter</div></div>`;
    items.slice(1).forEach(a=>{
      h+=`<div class="ncard" onclick="openArt(${a.id})">
        <div class="cemoji" style="background:${a.color}11;border-color:${a.color}22">${a.emoji}</div>
        <div class="cbody">
          <div class="ctag" style="color:${a.color}">${a.tag}</div>
          <div class="ctitle">${a.title}</div>
          <div class="csum">${a.summary}</div>
          <div class="cfoot"><span class="ctime">${a.time} · ${a.read}</span><button class="cread">Read →</button></div>
        </div>
      </div>`;
    });
    feed.innerHTML=h;
    feed.style.transition='opacity .38s ease,transform .38s cubic-bezier(.34,1.2,.64,1)';
    feed.style.opacity='1'; feed.style.transform='translateY(0)';
  },220);
}

function openArt(id){
  const a=A.find(x=>x.id===id); if(!a) return;
  document.getElementById('sEmoji').textContent=a.emoji;
  document.getElementById('sTag').textContent=a.tag;
  document.getElementById('sTag').style.color=a.color;
  document.getElementById('sTitle').textContent=a.title;
  document.getElementById('sSrc').textContent=a.source;
  document.getElementById('sTime').textContent=a.time+' · '+a.read;
  document.getElementById('sBy').innerHTML=`<span>${a.source}</span><div class="adot"></div><span style="color:var(--t3)">${a.time}</span><div class="adot"></div><span style="color:var(--t3)">${a.read}</span>`;
  const bodyEl=document.getElementById('sBody');
  bodyEl.innerHTML='<div class="ldots"><span></span><span></span><span></span></div>';
  let i=0;
  function next(){
    if(i===0) bodyEl.innerHTML='';
    if(i>=a.body.length) return;
    const bl=a.body[i];
    const el=document.createElement(bl.t==='quote'?'blockquote':bl.t==='pull'?'div':'p');
    if(bl.t==='pull') el.className='pull';
    el.textContent=bl.x;
    el.style.cssText='opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s cubic-bezier(.34,1.2,.64,1)';
    bodyEl.appendChild(el);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translateY(0)'; }));
    i++; setTimeout(next,90);
  }
  setTimeout(next,360);
  document.getElementById('overlay').classList.add('show');
  document.querySelector('.sbody').scrollTop=0;
  if(navigator.vibrate) navigator.vibrate(8);
}

function closeArt(){ document.getElementById('overlay').classList.remove('show'); }
function maybeClose(e){ if(e.target===document.getElementById('overlay')) closeArt(); }

function setupIsland(){
  const island=document.getElementById('island');
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
      tab.classList.add('on');
      island.classList.add('pop');
      setTimeout(()=>island.classList.remove('pop'),350);
    });
  });
}

// Swipe to dismiss sheet
let sy=0;
const sheet=document.getElementById('sheet');
sheet.addEventListener('touchstart',e=>{ sy=e.touches[0].clientY; },{passive:true});
sheet.addEventListener('touchmove',e=>{
  const dy=e.touches[0].clientY-sy;
  if(dy>0 && document.querySelector('.sbody').scrollTop===0){
    sheet.style.transform=`translateY(${dy}px)`; sheet.style.transition='none';
  }
},{passive:true});
sheet.addEventListener('touchend',e=>{
  sheet.style.transition='';
  if(e.changedTouches[0].clientY-sy>90) closeArt();
  sheet.style.transform='';
},{passive:true});

init();
</script>
</body>
</html>
